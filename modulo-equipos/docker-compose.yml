version: '3.8'

services:
  equipos-db:
    image: postgres:15-alpine
    container_name: equipos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: equipos_db
    ports:
      - "5436:5432"
    volumes:
      - equipos_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  equipos-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: equipos_backend
    depends_on:
      - equipos-db
    environment:
      PORT: 3001
      DB_HOST: equipos-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: equipos_db
      JWT_SECRET: ${JWT_SECRET}
      MAIN_API_URL: ${MAIN_API_URL:-http://host.docker.internal:3000/api}
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  equipos_db_data:
